services:
  - type: web
    name: makitiplus
    runtime: static
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: NODE_VERSION
        value: "20"
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /sw.js
        name: Cache-Control
        value: no-cache
      - path: /manifest.webmanifest
        name: Cache-Control
        value: public, max-age=3600
    redirects:
      - source: //*
        target: /index.html
        statusCode: 200
